<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Website</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 16px;
            color: #1a1a1a;
            background: #ffffff;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .player-wrap {
            position: relative;
            padding-top: 56.25%;
            background: #f2f2f2;
            border-radius: 8px;
            overflow: hidden;
        }

        .player-wrap iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        input {
            width: 35%;
            padding: 6px;
        }
    </style>
</head>

<body>

    <div class="controls">

        <button id="prevSs-btn">← Prev Season</button>
        <span id="Season-label">Season: 1</span>
        <button id="nextSs-btn">Next Season →</button>

        <button id="prevEp-btn">← Prev Ep</button>
        <span id="Episode-label">Episode: 1</span>
        <button id="nextEp-btn">Next Ep →</button>

        <input id="id-input" placeholder="Enter IMDb ID">
    </div>

    <div class="player-wrap">
        <iframe id="player" src="https://vsembed.ru/embed/tv?imdb=tt0491738&season=1&episode=1" allowfullscreen>
        </iframe>
    </div>

    <script>
        let currentId = localStorage.getItem("currentId") || "tt0491738";

        let episodes = [];
        let currentIndex = 0;

        const player = document.getElementById("player");
        const episodeLabel = document.getElementById("Episode-label");
        const seasonLabel = document.getElementById("Season-label");
        const idInput = document.getElementById("id-input");

        idInput.value = currentId;

        // --------------------
        // STORAGE
        // --------------------
        function saveProgress() {
            let progress = JSON.parse(localStorage.getItem("progress")) || {};
            progress[currentId] = currentIndex;
            localStorage.setItem("progress", JSON.stringify(progress));
            localStorage.setItem("currentId", currentId);
        }

        function loadProgress(id) {
            let progress = JSON.parse(localStorage.getItem("progress")) || {};
            currentIndex = progress[id] || 0;
        }

        // --------------------
        // TVMAZE LOAD
        // --------------------
        async function loadShow(imdbId) {
            try {
                episodes = [];
                currentIndex = 0;

                // 1. Lookup show
                const res1 = await fetch(`https://api.tvmaze.com/lookup/shows?imdb=${imdbId}`);

                if (!res1.ok) {
                    alert("Show not found (invalid IMDb ID)");
                    return;
                }

                const show = await res1.json();

                if (!show || !show.id) {
                    alert("Show not found");
                    return;
                }

                // 2. Get episodes
                const res2 = await fetch(`https://api.tvmaze.com/shows/${show.id}/episodes`);

                if (!res2.ok) {
                    alert("Failed to load episodes");
                    return;
                }

                const data = await res2.json();

                if (!Array.isArray(data)) {
                    alert("Episode data error");
                    return;
                }

                episodes = data.map(ep => ({
                    season: ep.season,
                    episode: ep.number
                }));

                loadProgress(imdbId);

                if (currentIndex >= episodes.length) {
                    currentIndex = 0;
                }

                updatePlayer();

            } catch (err) {
                console.error("ERROR:", err);
                alert("Network or API error");
            }
        }

        // --------------------
        // PLAYER UPDATE
        // --------------------
        function updatePlayer() {
            if (!episodes.length) return;

            const ep = episodes[currentIndex];

            player.src =
                `https://vsembed.ru/embed/tv?imdb=${currentId}&season=${ep.season}&episode=${ep.episode}`;

            episodeLabel.textContent = `Episode: ${ep.episode}`;
            seasonLabel.textContent = `Season: ${ep.season}`;

            saveProgress();
        }

        // --------------------
        // BUTTONS (FIXED SAFE LOGIC)
        // --------------------
        document.getElementById("nextEp-btn").onclick = () => {
            if (!episodes.length) return;

            if (currentIndex < episodes.length - 1) {
                currentIndex++;
                updatePlayer();
            }
        };

        document.getElementById("prevEp-btn").onclick = () => {
            if (!episodes.length) return;

            if (currentIndex > 0) {
                currentIndex--;
                updatePlayer();
            }
        };

        // Season jump (simple + safe)
        document.getElementById("nextSs-btn").onclick = () => {
            if (!episodes.length) return;

            const currentSeason = episodes[currentIndex].season;

            const next = episodes.findIndex((e, i) =>
                i > currentIndex && e.season > currentSeason
            );

            if (next !== -1) {
                currentIndex = next;
                updatePlayer();
            }
        };

        document.getElementById("prevSs-btn").onclick = () => {
            if (!episodes.length) return;

            const currentSeason = episodes[currentIndex].season;

            let prev = -1;

            for (let i = currentIndex - 1; i >= 0; i--) {
                if (episodes[i].season < currentSeason) {
                    prev = i;
                    break;
                }
            }

            if (prev !== -1) {
                currentIndex = prev;
                updatePlayer();
            }
        };

        // --------------------
        // ENTER KEY LOAD SHOW
        // --------------------
        idInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const id = idInput.value.trim();
                if (!id) return;

                currentId = id;
                loadShow(currentId);
            }
        });

        // --------------------
        // INIT
        // --------------------
        loadShow(currentId);
    </script>

</body>

</html>
