<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Website</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 16px;
            color: #1a1a1a;
            background: #ffffff;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        select {
            flex: 1;
            min-width: 200px;
            padding: 8px 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #fff;
        }

        .player-wrap {
            position: relative;
            padding-top: 56.25%;
            /* 16:9 aspect ratio */
            background: #f2f2f2;
            border-radius: 8px;
            overflow: hidden;
        }

        .player-wrap iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        p.note {
            font-size: 13px;
            color: #666;
            margin-top: 12px;
        }
    </style>
</head>

<body>

    <div class="controls">

        <button id="prevSs-btn" type="button">&larr; Prev</button>
        <span id="Season-label" style="font-size: 14px; align-self: center;">Season: 1</span>
        <button id="nextSs-btn" type="button">Next &rarr;</button>



        <button id="prevEp-btn" type="button">&larr; Prev</button>
        <span id="Episode-label" style="font-size: 14px; align-self: center;">Episode: 1</span>
        <button id="nextEp-btn" type="button">Next &rarr;</button>




        <input type="text" id="id-input" placeholder="Enter a Show ID"
            style="width: 35%; padding: 10px; margin-bottom: 0px;">

    </div>

    <div class="player-wrap">
        <iframe id="player" src="https://vsembed.ru/embed/tv?imdb=tt0491738&season=1&episode=1"
            title="YouTube video player"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>

    <script>
        let currentEpIndex = Number(localStorage.getItem("currentEpisode")) || 1;
        let currentSsIndex = Number(localStorage.getItem("currentSeason")) || 1;
        let currentId = localStorage.getItem("currentId") || "tt0491738";

        var player = document.getElementById('player');
        var episodeLabel = document.getElementById('Episode-label');
        var seasonLabel = document.getElementById('Season-label');

        document.getElementById("id-input").value = currentId;

        function updatePlayer() {
            player.src = `https://vsembed.ru/embed/tv?imdb=${currentId}&season=${currentSsIndex}&episode=${currentEpIndex}`;
            episodeLabel.textContent = "Episode: " + (currentEpIndex)
            seasonLabel.textContent = "Season: " + (currentSsIndex);

            localStorage.setItem("currentId", currentId);
            localStorage.setItem("currentSeason", currentSsIndex);
            localStorage.setItem("currentEpisode", currentEpIndex);
        }

        document.getElementById('id-input').addEventListener('input', function () {
            currentId = this.value.trim();
            updatePlayer();
        });

        document.getElementById('nextEp-btn').addEventListener('click', function () {
            currentEpIndex = (currentEpIndex + 1)
            updatePlayer();
        });

        document.getElementById('prevEp-btn').addEventListener('click', function () {
            currentEpIndex = (currentEpIndex - 1)
            updatePlayer();
        });

        document.getElementById('nextSs-btn').addEventListener('click', function () {
            currentSsIndex = (currentSsIndex + 1)
            updatePlayer();
        });

        document.getElementById('prevSs-btn').addEventListener('click', function () {
            currentSsIndex = (currentSsIndex - 1)
            updatePlayer();
        });
    </script>

</body>

</html>
