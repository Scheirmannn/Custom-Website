<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Website</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 16px;
            color: #1a1a1a;
            background: #ffffff;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        select {
            flex: 1;
            min-width: 200px;
            padding: 8px 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #fff;
        }

        .player-wrap {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            /* 16:9 aspect ratio */
            background: #f2f2f2;
            border-radius: 8px;
            overflow: hidden;
        }

        .player-wrap iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        p.note {
            font-size: 13px;
            color: #666;
            margin-top: 12px;
        }
    </style>
</head>

<body>

    <div class="controls">
        <button id="prev-btn" type="button">&larr; Prev</button>
        <span id="position-label" style="font-size: 14px; align-self: center;">Episode: 1</span>
        <button id="next-btn" type="button">Next &rarr;</button>
    </div>

    <div class="player-wrap">
        <iframe id="player" src="https://vsembed.ru/embed/tv?imdb=tt0491738&season=5&episode=1"
            title="YouTube video player"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>

    <script>
        var currentIndex = 1;

        var player = document.getElementById('player');
        var label = document.getElementById('position-label');

        function updatePlayer() {
            player.src = 'https://vsembed.ru/embed/tv?imdb=tt0491738&season=5&episode=' + currentIndex;
            label.textContent = "Episode: "(currentIndex + 1)
        }

        document.getElementById('next-btn').addEventListener('click', function () {
            currentIndex = (currentIndex + 1)
            updatePlayer();
        });

        document.getElementById('prev-btn').addEventListener('click', function () {
            currentIndex = (currentIndex - 1)
            updatePlayer();
        });
    </script>

</body>

</html>
