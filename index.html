<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Website</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 30px;
        }

        .layout {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            max-width: 1400px;
            margin: auto;
        }

        .sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .1);
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 18px;
            font-weight: 500;
            text-align: center;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
        }

        .player-wrap {
            flex: 1;
            max-height: 700px;
            aspect-ratio: 16/9;
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .player-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        @media(max-width:900px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }

        #savedShows {
            display: flex;
            flex-direction: column;
            gap: 8px;

            max-height: 141px;
            overflow-y: auto;
        }

        .saved-show {
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }

        .saved-show:hover {
            background: #ddd;
        }
    </style>
</head>

<body>

    <div class="layout">

        <div class="sidebar">

            <div class="card">
                <h3>Show ID</h3>
                <input type="text" id="id-input" placeholder="Enter a Show ID">
            </div>

            <div class="card">
                <h3>Season</h3>
                <div class="control-row">
                    <button id="prevSs-btn">&larr;</button>
                    <span id="Season-label">Season: 1</span>
                    <button id="nextSs-btn">&rarr;</button>
                </div>
            </div>

            <div class="card">
                <h3>Episode</h3>
                <div class="control-row">
                    <button id="prevEp-btn">&larr;</button>
                    <span id="Episode-label">Episode: 1</span>
                    <button id="nextEp-btn">&rarr;</button>
                </div>
            </div>

            <div class="card">
                <h3>Saved Shows</h3>
                <div id="savedShows"></div>
            </div>

        </div>

        <div class="player-wrap">
            <iframe id="player" src="https://vsembed.su/embed/tv?imdb=tt0491738&season=1&episode=1"
                allowfullscreen></iframe>
        </div>

    </div>

    <script>
        let currentId = localStorage.getItem("currentId") || "tt0491738";
        let currentSsIndex = 1;
        let currentEpIndex = 1;

        const player = document.getElementById('player');
        const episodeLabel = document.getElementById('Episode-label');
        const seasonLabel = document.getElementById('Season-label');
        const idInput = document.getElementById('id-input');
        const savedShows = document.getElementById("savedShows");


        idInput.value = currentId;

        function updateSavedShows() {
            const progress = JSON.parse(localStorage.getItem("progress"))

            savedShows.innerHTML = "";

            for (const id in progress) {
                const div = document.createElement("div");
                div.className = "saved-show";

                div.textContent =
                    `${id} - S${progress[id].season}E${progress[id].episode}`;

                div.addEventListener("click", function () {
                    currentId = id;
                    idInput.value = id;
                    loadProgress(id);
                    updatePlayer();
                });

                div.addEventListener("dblclick", function () {
                    let progress = JSON.parse(localStorage.getItem("progress")) || {};

                    delete progress[id];

                    localStorage.setItem("progress", JSON.stringify(progress));

                    updateSavedShows();
                });

                savedShows.appendChild(div);
            }

        }

        function saveProgress() {
            let progress = JSON.parse(localStorage.getItem("progress")) || {};

            progress[currentId] = {
                season: currentSsIndex,
                episode: currentEpIndex
            };

            localStorage.setItem("progress", JSON.stringify(progress));
            localStorage.setItem("currentId", currentId);
            updateSavedShows();
        }

        function loadProgress(id) {
            let progress = JSON.parse(localStorage.getItem("progress")) || {};

            if (progress[id]) {
                currentSsIndex = progress[id].season;
                currentEpIndex = progress[id].episode;
            } else {
                currentSsIndex = 1;
                currentEpIndex = 1;
            }
        }

        function updatePlayer() {
            player.src = `https://player.videasy.net/tv/${currentId}/${currentSsIndex}/${currentEpIndex}`;

            episodeLabel.textContent = `Episode: ${currentEpIndex}`;
            seasonLabel.textContent = `Season: ${currentSsIndex}`;

            saveProgress();
        }

        loadProgress(currentId);
        updatePlayer();

        idInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                const id = this.value.trim();

                if (id !== "") {
                    currentId = id;
                    loadProgress(currentId);
                    updatePlayer();
                }
            }
        });

        document.getElementById('nextEp-btn').addEventListener('click', function () {
            currentEpIndex++;
            updatePlayer();
        });

        document.getElementById('prevEp-btn').addEventListener('click', function () {
            if (currentEpIndex > 1) {
                currentEpIndex--;
                updatePlayer();
            }
        });

        document.getElementById('nextSs-btn').addEventListener('click', function () {
            currentSsIndex++
            currentEpIndex = 1;
            updatePlayer();
        });

        document.getElementById('prevSs-btn').addEventListener('click', function () {
            if (currentSsIndex > 1) {
                currentSsIndex--;
                currentEpIndex = 1;
                updatePlayer();
            }
        });
    </script>

</body>

</html>
