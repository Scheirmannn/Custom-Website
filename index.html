<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Website</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 16px;
            color: #1a1a1a;
            background: #ffffff;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        select {
            flex: 1;
            min-width: 200px;
            padding: 8px 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #fff;
        }

        .player-wrap {
            position: relative;
            padding-top: 56.25%;
            /* 16:9 aspect ratio */
            background: #f2f2f2;
            border-radius: 8px;
            overflow: hidden;
        }

        .player-wrap iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        p.note {
            font-size: 13px;
            color: #666;
            margin-top: 12px;
        }
    </style>
</head>

<body>

    <div class="controls">

        <button id="prevSs-btn" type="button">&larr; Prev</button>
        <span id="Season-label" style="font-size: 14px; align-self: center;">Season: 1</span>
        <button id="nextSs-btn" type="button">Next &rarr;</button>



        <button id="prevEp-btn" type="button">&larr; Prev</button>
        <span id="Episode-label" style="font-size: 14px; align-self: center;">Episode: 1</span>
        <button id="nextEp-btn" type="button">Next &rarr;</button>




        <input type="text" id="id-input" placeholder="Enter a Show ID"
            style="width: 35%; padding: 0px; margin-bottom: 0px;">

    </div>

    <div class="player-wrap">
        <iframe id="player" src="https://vsembed.ru/embed/tv?imdb=tt0491738&season=1&episode=1"
            title="YouTube video player"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>

    <script>
        let currentId = localStorage.getItem("currentId") || "tt0491738";
        let currentSsIndex = 1;
        let currentEpIndex = 1;

        const player = document.getElementById('player');
        const episodeLabel = document.getElementById('Episode-label');
        const seasonLabel = document.getElementById('Season-label');
        const idInput = document.getElementById('id-input');

        idInput.value = currentId;

        function saveProgress() {
            let progress = JSON.parse(localStorage.getItem("progress")) || {};

            progress[currentId] = {
                season: currentSsIndex,
                episode: currentEpIndex
            };

            localStorage.setItem("progress", JSON.stringify(progress));
            localStorage.setItem("currentId", currentId);
        }

        function loadProgress(id) {
            let progress = JSON.parse(localStorage.getItem("progress")) || {};

            if (progress[id]) {
                currentSsIndex = progress[id].season;
                currentEpIndex = progress[id].episode;
            } else {
                currentSsIndex = 1;
                currentEpIndex = 1;
            }
        }

        function updatePlayer() {
            player.src = `https://vsembed.ru/embed/tv?imdb=${currentId}&season=${currentSsIndex}&episode=${currentEpIndex}`;

            episodeLabel.textContent = `Episode: ${currentEpIndex}`;
            seasonLabel.textContent = `Season: ${currentSsIndex}`;

            saveProgress();
        }


        loadProgress(currentId);
        updatePlayer();


        document.getElementById('id-input').addEventListener('input', function () {
            const id = this.value.trim();

            if (id !== "") {
                currentId = id;
                loadProgress(currentId);
                updatePlayer();
            }
        });

        document.getElementById('nextEp-btn').addEventListener('click', function () {
            currentEpIndex++;
            updatePlayer();
        });

        document.getElementById('prevEp-btn').addEventListener('click', function () {
            if (currentEpIndex > 1) {
                currentEpIndex--;
                updatePlayer();
            }
        });

        document.getElementById('nextSs-btn').addEventListener('click', function () {
            currentSsIndex++
            currentEpIndex = 1;
            updatePlayer();
        });

        document.getElementById('prevSs-btn').addEventListener('click', function () {
            if (currentSsIndex > 1) {
                currentSsIndex--;
                currentEpIndex = 1;
                updatePlayer();
            }
        });
    </script>

</body>

</html>
