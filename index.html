<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Website</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 16px;
            color: #1a1a1a;
            background: #ffffff;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .player-wrap {
            position: relative;
            padding-top: 56.25%;
            background: #f2f2f2;
            border-radius: 8px;
            overflow: hidden;
        }

        .player-wrap iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        input {
            width: 35%;
            padding: 6px;
        }
    </style>
</head>

<body>

    <div class="controls">

        <button id="prevSs-btn">← Prev Season</button>
        <span id="Season-label">Season: 1</span>
        <button id="nextSs-btn">Next Season →</button>

        <button id="prevEp-btn">← Prev Ep</button>
        <span id="Episode-label">Episode: 1</span>
        <button id="nextEp-btn">Next Ep →</button>

        <input id="id-input" placeholder="Enter IMDb ID">
    </div>

    <div class="player-wrap">
        <iframe id="player" src="https://vsembed.ru/embed/tv?imdb=tt0491738&season=1&episode=1" allowfullscreen>
        </iframe>
    </div>

    <script>
        let currentId = localStorage.getItem("currentId") || "tt0491738";

        let episodes = [];
        let index = 0;

        const player = document.getElementById("player");
        const epLabel = document.getElementById("Episode-label");
        const ssLabel = document.getElementById("Season-label");
        const input = document.getElementById("id-input");

        input.value = currentId;

        // --------------------
        // SAVE / LOAD (SAFE)
        // --------------------
        function save() {
            const data = JSON.parse(localStorage.getItem("progress") || "{}");
            data[currentId] = index;
            localStorage.setItem("progress", JSON.stringify(data));
            localStorage.setItem("currentId", currentId);
        }

        function load(id) {
            const data = JSON.parse(localStorage.getItem("progress") || "{}");
            index = data[id] || 0;
        }

        // --------------------
        // LOAD SHOW (SAFE)
        // --------------------
        async function loadShow(imdb) {
            try {
                episodes = [];
                index = 0;

                const res = await fetch(`https://api.tvmaze.com/lookup/shows?imdb=${imdb}`);
                if (!res.ok) throw new Error("Show not found");

                const show = await res.json();

                const res2 = await fetch(`https://api.tvmaze.com/shows/${show.id}/episodes`);
                if (!res2.ok) throw new Error("Episodes failed");

                const data = await res2.json();

                episodes = data.map(e => ({
                    season: e.season,
                    episode: e.number
                }));

                load(imdb);

                if (index >= episodes.length) index = 0;

                update();

            } catch (err) {
                console.error(err);
                alert("Could not load show. Check IMDb ID.");
            }
        }

        // --------------------
        // UPDATE PLAYER
        // --------------------
        function update() {
            if (!episodes.length) return;

            const ep = episodes[index];

            player.src =
                `https://vsembed.ru/embed/tv?imdb=${currentId}&season=${ep.season}&episode=${ep.episode}`;

            epLabel.textContent = `Episode: ${ep.episode}`;
            ssLabel.textContent = `Season: ${ep.season}`;

            save();
        }

        // --------------------
        // BUTTONS
        // --------------------
        document.getElementById("nextEp-btn").onclick = () => {
            if (index < episodes.length - 1) {
                index++;
                update();
            }
        };

        document.getElementById("prevEp-btn").onclick = () => {
            if (index > 0) {
                index--;
                update();
            }
        };

        // --------------------
        // ENTER KEY
        // --------------------
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const val = input.value.trim();
                if (!val) return;

                currentId = val;
                loadShow(currentId);
            }
        });

        // --------------------
        // INIT
        // --------------------
        loadShow(currentId);
    </script>

</body>

</html>
